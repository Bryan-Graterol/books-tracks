# ⚠️  Cambia 'bookshelf-app' por el nombre único que elijas en Fly.io
app = 'Book-Tracker'
primary_region = 'mia'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
