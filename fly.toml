# fly.toml app configuration file generated for books-tracks on 2026-04-09T12:14:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'books-tracks'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
