server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para assets
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;

    # SPA: cualquier ruta que no exista devuelve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets estáticos con hash en el nombre
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cachear index.html para que siempre cargue la versión más nueva
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
