# ⚠️  Cambia 'bookshelf-api' por el nombre único que elijas en Fly.io
app = 'bookshelf-api'
primary_region = 'mia'

[build]

[env]
  PORT = "8000"
  # CORS_ORIGINS se configura como fly secret (ver instrucciones de despliegue)

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
